version: '3.8'
services:
  postgres-auth:
    image: postgres:16
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: auth_db
    ports:
      - "5442:5432"
    volumes:
      - pgdata-auth:/var/lib/postgresql/data

  postgres-services:
    image: postgres:16
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: services_db
    ports:
      - "5443:5432"
    volumes:
      - pgdata-services:/var/lib/postgresql/data


volumes:
  pgdata-auth:
  pgdata-services: